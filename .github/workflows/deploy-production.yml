name: Deploy Production

# Auto-deploys on every push to `production` — i.e. when a staging → production
# PR is merged. `workflow_dispatch` is kept for manual re-runs and rollbacks.
on:
  workflow_dispatch:
  push:
    branches: [production]

env:
  AWS_REGION: eu-west-1
  ENVIRONMENT: production

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck || true

      - name: Test
        run: pnpm test || true

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.0

      - name: Terraform Format
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda
        working-directory: apps/lambda-api
        run: pnpm run build

      - name: Package Lambda
        working-directory: apps/lambda-api
        run: |
          mkdir -p packages
          cd dist
          zip ../packages/lambda-api.zip index.js

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name gs-mobile-api-production \
            --zip-file fileb://apps/lambda-api/packages/lambda-api.zip

      - name: Update Lambda runtime config
        run: |
          aws lambda update-function-configuration \
            --function-name gs-mobile-api-production \
            --handler index.handler \
            --runtime nodejs22.x
        continue-on-error: true

      - name: Smoke check — placeholder secrets must not leak to GS
        run: |
          # Give the Lambda a few seconds to settle after update-function-code.
          sleep 5
          LOCATION=$(curl -s -o /dev/null -D - \
            'https://api.mobile.grand-shooting.com/auth/start?platform=ios' \
            | tr -d '\r' \
            | awk -F': ' 'tolower($1) == "location" { print $2 }')
          echo "Location: ${LOCATION}"
          if [ -z "${LOCATION}" ]; then
            echo "::error::/auth/start did not redirect; deploy is broken."
            exit 1
          fi
          if echo "${LOCATION}" | grep -q 'client_id=REPLACE_ME'; then
            echo "::error::OAuth client_id is REPLACE_ME — seed-secrets was not run or skipped this entry."
            echo "::error::Run 'ENV=production ./scripts/seed-secrets.sh' and force a Lambda cold start."
            exit 1
          fi
          if ! echo "${LOCATION}" | grep -q 'client_id='; then
            echo "::error::No client_id in the redirect Location — /auth/start is misconfigured."
            exit 1
          fi
          echo "✓ /auth/start redirects with a real client_id"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [terraform, deploy-lambda]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.terraform.result }}" == "success" ] && [ "${{ needs.deploy-lambda.result }}" == "success" ]; then
            echo "Production deployment successful"
            echo "API URL: https://api.mobile.grand-shooting.com"
          else
            echo "Production deployment failed"
            exit 1
          fi
